<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Mensajes del Ticket')}">
  <title>Mensajes del Ticket</title>
</head>
<body id="page-top">
<div id="wrapper">
  <ul th:replace="~{fragments/sidebar :: sidebar}"></ul>

  <div id="content-wrapper" class="d-flex flex-column">
    <div id="content">
      <nav th:replace="~{fragments/topbar :: topbar}"></nav>

      <div class="container-fluid">
        <h1 class="h3 mb-4 text-gray-800">Mensajes del Ticket</h1>

        <div class="card shadow mb-4">
          <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary" th:text="'Ticket: ' + ${ticket.title}">Título del ticket</h6>
            <p class="mb-0"><strong>Cliente:</strong> <span th:text="${customerName}"></span></p>
            <p class="mb-0"><strong>Estado:</strong> <span th:text="${ticket.currentStatus}"></span></p>
            <p class="mb-0"><strong>Categoria:</strong> <span th:text="${ticket.categoryName}"></span></p>
            <p class="mb-0"><strong>Creado:</strong> <span th:text="${#temporals.format(ticket.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
            <p class="mb-0"><strong>Actualizado:</strong> <span th:text="${#temporals.format(ticket.updatedAt, 'dd/MM/yyyy HH:mm')}"></span></p>
          </div>
          <div th:if="${error}" class="alert alert-danger" role="alert">
            <p th:text="${error}"></p>
          </div>

          <div class="card-body">

            <div class="card-header py-3" style="display: flex; justify-content: space-between; align-items: center;">
              <h5 class="mb-3">Historial de mensajes</h5>
              <div style="display: flex; gap: 0.5rem;">
                <th:block th:if="${resolvedButton}">
                  <form th:action="@{/tickets/{ticketId}/resolved(ticketId=${ticket.id})}" method="post"
                        onsubmit="return confirm('¿Estás seguro que querés marcar el ticket como resuelto?');">
                    <button type="submit" class="btn btn-success">Marcar como resuelto</button>
                  </form>
                </th:block>

                <th:block th:if="${closeButton}">
                  <form th:action="@{/tickets/{ticketId}/close(ticketId=${ticket.id})}" method="post"
                        onsubmit="return confirm('¿Estás seguro que querés cerrar el ticket? Esta acción no se puede deshacer.');">
                    <button type="submit" class="btn btn-danger">Cerrar Ticket</button>
                  </form>
                </th:block>
              </div>
            </div>
            <div class="chat-container mb-4">
              <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted">
                No hay mensajes para este ticket.
              </div>

              <!-- Mensajes en formato burbuja -->
              <div th:each="msg : ${messages}">
                <div class="message-wrapper">
                  <div th:class="${msg.personId} == ${customerId} ? 'chat-bubble right' : 'chat-bubble left'">
                    <strong th:text="${msg.personName} + ' - ' + ${#temporals.format(msg.createdAt, 'dd/MM/yyyy HH:mm')}"></strong><br>
                    <span th:text="${msg.body}">Contenido del mensaje</span>
                    <div th:if="${msg.pictureUrl != null and !#strings.isEmpty(msg.pictureUrl)}" class="mt-2">
                      <img th:src="${msg.pictureUrl}" alt="Imagen del mensaje" style="max-width: 100%; border-radius: 5px;">
                    </div>
                  </div>
                </div>
              </div>
            </div>


            <hr/>
            <form th:action="@{'/tickets/' + ${ticket.id} + '/messages'}"
                  th:object="${ticketMessageDTO}"
                  method="post"
                  enctype="multipart/form-data">

              <div class="form-group">
                <label th:for="*{body}">Nuevo mensaje</label>
                <textarea th:field="*{body}" class="form-control" rows="3"
                          placeholder="Escribí tu mensaje acá..." required></textarea>
                <div th:if="${#fields.hasErrors('body')}" class="text-danger" th:errors="*{body}">Error</div>
              </div>

              <div class="form-group d-flex align-items-center gap-2">
                <button type="button" class="btn btn-outline-secondary" disabled title="Subir imagen (no disponible)">
                  <i class="fas fa-image"></i> Imagen
                </button>
                <input type="hidden" th:field="*{pictureUrl}" />
                <button type="submit" class="btn btn-primary ml-auto">
                  <i class="fas fa-paper-plane"></i> Enviar
                </button>
              </div>
            </form>



            <a th:href="${session.lastTicketPage}" class="btn btn-secondary mt-4">Volver</a>
          </div>
        </div>
      </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</div>

<a th:replace="~{fragments/utils :: scrollToTop}"></a>
<div th:replace="~{fragments/utils :: logoutModal}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
