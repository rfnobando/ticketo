<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Mis Tickets')}">
    <title>Mis Tickets</title>
</head>
<body id="page-top">
<div id="wrapper">
    <ul th:replace="~{fragments/sidebar :: sidebar}"></ul>

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <nav th:replace="~{fragments/topbar :: topbar}"></nav>

            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800" th:text="${tituloPagina}">Título</h1>

                <div class="card shadow mb-4">
                    <div class="card-header py-3" style="display: flex; justify-content: space-between; align-items: center;">
                        <h6 class="m-0 font-weight-bold text-primary">Listado de Tickets</h6>

                        <!-- Mostrar botón "Crear Ticket" solo si corresponde -->
                        <a th:if="${mostrarBotonCrear}" href="/tickets/create" class="btn btn-primary">Crear Ticket</a>

                        <!-- Botón para ir a otra vista (si corresponde) -->
                        <a th:if="${linkAlternativo != null}" th:href="${linkAlternativo.url}" class="btn btn-outline-primary ml-2" th:text="${linkAlternativo.texto}"></a>
                    </div>
                    <div class="card-body">
                        <form method="get" th:action="@{${actionUrl}}" class="form-inline justify-content-end">
                            <div class="form-group mr-3 mb-2">
                                <label for="estado" class="mr-2">Filtrar por estado:</label>
                                <select name="estado" id="estado"class="form-control">
                                    <option value="">Todos</option>
                                    <option th:value="${T(com.group10.ticketo.constants.TicketStatusConstants).PENDING}"
                                            th:selected="${estado == T(com.group10.ticketo.constants.TicketStatusConstants).PENDING}">
                                        Pendiente
                                    </option>
                                    <option th:value="${T(com.group10.ticketo.constants.TicketStatusConstants).IN_PROGRESS}"
                                            th:selected="${estado == T(com.group10.ticketo.constants.TicketStatusConstants).IN_PROGRESS}">
                                        En Progreso
                                    </option>
                                    <option th:value="${T(com.group10.ticketo.constants.TicketStatusConstants).RESOLVED}"
                                            th:selected="${estado == T(com.group10.ticketo.constants.TicketStatusConstants).RESOLVED}">
                                        Resuelto
                                    </option>
                                    <option th:value="${T(com.group10.ticketo.constants.TicketStatusConstants).CLOSED}"
                                            th:selected="${estado == T(com.group10.ticketo.constants.TicketStatusConstants).CLOSED}">
                                        Cerrado
                                    </option>
                                </select>
                            </div>

                            <div class="form-group mr-3 mb-2">
                                <label for="orden" class="mr-2">Orden:</label>
                                <select name="orden" id="orden" class="form-control">
                                    <option value="asc" th:selected="${orden == 'asc'}">Más antiguos primero</option>
                                    <option value="desc" th:selected="${orden == 'desc'}">Más recientes primero</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary mb-2">Filtrar</button>
                        </form>
                        <div class="table-responsive">
                            <table class="table table-bordered" width="100%" cellspacing="0">
                                <thead class="thead-light">
                                    <tr>
                                        <th>Título</th>
                                        <th>Estado</th>
                                        <th>Categoría</th>
                                        <th>Fecha de creación</th>
                                        <th>Fecha de actualización</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="ticket : ${tickets}">
                                        <td th:text="${ticket.title}">Título</td>
                                        <td th:text="${ticket.currentStatus}">Estado</td>
                                        <td th:text="${ticket.categoryName}">Categoría</td>
                                        <td th:text="${ticket.createdAt != null} ? ${#temporals.format(ticket.createdAt, 'dd/MM/yyyy HH:mm')} : '-'">Fecha creación</td>
                                        <td th:text="${ticket.updatedAt != null} ? ${#temporals.format(ticket.updatedAt, 'dd/MM/yyyy HH:mm')} : '-'">Fecha actualización</td>
                                        <td>
                                            <a th:href="@{'/tickets/' + ${ticket.id} + '/messages'}" class="btn btn-sm btn-primary">Ver Mensajes</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div th:if="${#lists.isEmpty(tickets)}" class="text-center text-muted mt-3" th:text="${mensajeVacio}">
                                No tenés tickets registrados.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
</div>

<a th:replace="~{fragments/utils :: scrollToTop}"></a>
<div th:replace="~{fragments/utils :: logoutModal}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
