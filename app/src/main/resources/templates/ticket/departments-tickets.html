<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Mis Tickets')}">
  <title>Mis Tickets</title>
</head>
<body id="page-top">
<div id="wrapper">
  <ul th:replace="~{fragments/sidebar :: sidebar}"></ul>

  <div id="content-wrapper" class="d-flex flex-column">
    <div id="content">
      <nav th:replace="~{fragments/topbar :: topbar}"></nav>

      <div class="container-fluid">
        <h1 class="h3 mb-4 text-gray-800">Mis Tickets</h1>

        <div class="card shadow mb-4">
          <div class="card-header py-3" style="display: flex; justify-content: space-between; align-items: center;">
            <h6 class="m-0 font-weight-bold text-primary">Listado de Tickets</h6>

          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered" width="100%" cellspacing="0">
                <thead class="thead-light">
                <tr>
                  <th>Título</th>
                  <th>Estado</th>
                  <th>Fecha de creación</th>
                  <th>Fecha de actualización</th>
                  <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ticket : ${tickets}">
                  <td th:text="${ticket.title}">Título</td>
                  <td th:text="${ticket.currentStatus}">Estado</td>
                  <td th:text="${ticket.createdAt != null} ? ${#temporals.format(ticket.createdAt, 'dd/MM/yyyy HH:mm')} : '-'">Fecha creación</td>
                  <td th:text="${ticket.updatedAt != null} ? ${#temporals.format(ticket.updatedAt, 'dd/MM/yyyy HH:mm')} : '-'">Fecha actualización</td>
                  <td>
                    <a th:href="@{'/tickets/' + ${ticket.id} + '/messages'}" class="btn btn-sm btn-primary">Ver Mensajes</a>
                  </td>
                </tr>
                </tbody>
              </table>
              <div th:if="${#lists.isEmpty(tickets)}" class="text-center text-muted mt-3">
                No tenés tickets registrados.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</div>

<a th:replace="~{fragments/utils :: scrollToTop}"></a>
<div th:replace="~{fragments/utils :: logoutModal}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
